skill_id: "20_notebooklm"
skill_source: "zzzexamples/20_notebooklm"

task_code: "通过 Google NotebookLM 做基于已上传文档的溯源问答与笔记库管理"
domain_hint: "browser-automation / source-grounded-research"

implementation:
  components:
    - part: "SKILL.md（纯自然语言部分）"
      nature: "触发条件、Core Workflow 步骤文本、Follow-Up 行为规范、Best Practices、Limitations、Decision Flow 文本"
      approx_weight: "~5%"
      role: "定义何时触发 skill、Agent 行为纪律（先查认证→管理 notebook→提问→追问→综合回答）以及全局约束"
    - part: "scripts/（8 个 Python 脚本共 1658 行）+ SKILL.md 中可执行命令块（~75 行）"
      nature: "run.py（venv wrapper）/ ask_question.py（浏览器问答）/ auth_manager.py（Google 认证）/ notebook_manager.py（库 CRUD）/ browser_session.py / browser_utils.py / config.py / setup_environment.py / cleanup_manager.py + SKILL.md 中大量 `python scripts/run.py ...` 命令"
      approx_weight: "~62%"
      role: "完成全部实际操作：自动创建 venv、安装依赖、Patchright 浏览器自动化、Google 登录持久化（混合认证）、Notebook 库增删查改、NotebookLM 提问与答案提取、环境清理"
    - part: "AUTHENTICATION.md（115 行）+ references/（api_reference / usage_patterns / troubleshooting 共 792 行）"
      nature: "混合认证架构说明、API/CLI 速查、操作模式大全、排障手册；其中含大量可执行命令的重复展示（作为速查 pattern）以及少量示教型 Python 代码"
      approx_weight: "~33%"
      role: "补充 why/how 层知识：解释持久上下文 + cookie 注入的混合认证设计、参数语义速查、常见故障与修复流程"
  desc_code_relationship: |
    SKILL.md 规定 "Always Use run.py Wrapper"，所有操作必须经 `python scripts/run.py [script]` 调用，
    这意味着 SKILL.md 的行为规范与 scripts/ 的执行能力是强耦合的：
    Description 层决定调用顺序（Step 1→4）和上层行为（如 follow-up 机制要求 Agent 自动追问直到信息完整），
    Code 层完成真正的浏览器自动化、认证恢复与问答执行。
    去掉 Code Agent 只有操作手册但无法真正操作 NotebookLM；去掉 Description 虽然工具可用但 Agent 不知调用顺序、wrapper 约束与追问纪律。
    Reference 层（AUTHENTICATION.md + references/）虽体量可观，但属于深层 how/why 补充，不是日常调用必需。
  implementation_mode: "Code 主导 + Description 操作编排"

review_flags:
  - "references/ 中的 `python scripts/run.py ...` 命令与 SKILL.md 有大量重复，但作为速查/排障语境保留在 reference 比例中"
  - "AUTHENTICATION.md 中约 40 行示教型 Python/TypeScript 代码按 reference 处理"
  - "images/、LICENSE、.gitignore、CHANGELOG.md、requirements.txt 未计入三类比例"
  - "总行数约 2775（不含非核心文件），比例按行数粗估"
