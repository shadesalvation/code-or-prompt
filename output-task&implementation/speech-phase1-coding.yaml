      nature: "自然语言：工作流 8 步、规则与默认值、指令增强模板、场景导航、环境说明"
      approx_weight: "~17%"
      role: "定义 Agent 完整执行路径、决策规则与指令增强方法"
    - part: "scripts/ + 内联代码"
      nature: "Python CLI（text_to_speech.py ~200 行）+ SKILL.md 与 cli.md 中的内联 bash 代码块"
      approx_weight: "~27%"
