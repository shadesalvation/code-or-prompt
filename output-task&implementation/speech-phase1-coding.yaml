  desc_code_relationship: |
    SKILL.md 在 Step 5 明确指示调用 text_to_speech.py，并强调 "Prefer the bundled CLI" 和 "Never modify"。
    Description 负责调用前的全部准备（意图判断、输入收集、指令增强、参数选择）和调用后的善后（验证、迭代、保存）；
    Code 只负责实际 API 交互。去掉 Code Agent 需自写 API 调用，去掉 Description Agent 不知何时用、怎么拼参数。
  implementation_mode: "Description 主导 + Code 执行"

